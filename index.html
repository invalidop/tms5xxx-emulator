<style>

  :root {
    --bg: #050a0e;

    --border: #1a3a55;
    --accent: #00d4ff;

  }

  header {
    text-align: center;
    margin-bottom: 36px;
  }

    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: clamp(1.6rem, 5vw, 2.8rem);
    letter-spacing: 0.08em;
    color: var(--accent);
    text-shadow: 0 0 20px rgba(0,212,255,0.6), 0 0 60px rgba(0,212,255,0.2);
    margin-bottom: 6px;
  }

  header .subtitle {
    color: var(--muted);
    font-size: 0.78rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 24px;
    width: 100%;
    max-width: 680px;
    margin-bottom: 16px;
    position: relative;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.5;
  }

  .section-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.6rem;
    letter-spacing: 0.3em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .dropzone {
    border: 2px dashed var(--border);
    border-radius: 4px;
    padding: 40px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .dropzone:hover, .dropzone.drag-over {
    border-color: var(--accent);
    background: rgba(0,212,255,0.04);
    box-shadow: var(--glow);
  }

  .dropzone .drop-icon {
    font-size: 2.5rem;
    margin-bottom: 10px;
    display: block;
    opacity: 0.6;
  }

  .dropzone p { font-size: 0.85rem; color: var(--muted); }
  .dropzone p strong { color: var(--accent); }
  .dropzone input[type=file] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer;
  }

  .file-loaded {
    display: flex; align-items: center; gap: 10px;
    font-size: 0.82rem; color: var(--accent2);
    background: rgba(0,255,136,0.06);
    border: 1px solid rgba(0,255,136,0.2);
    border-radius: 3px; padding: 10px 14px;
    margin-top: 10px;
  }

  /* Controls grid */
  .controls-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  @media (max-width: 480px) { .controls-grid { grid-template-columns: 1fr; } }

  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label { font-size: 0.7rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }

  select, input[type=number], input[type=text] {
    background: #07111a;
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.85rem;
    padding: 8px 10px;
    border-radius: 3px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    width: 100%;
    appearance: none;
    -webkit-appearance: none;
  }

  select:focus, input:focus {
    border-color: var(--accent);
    box-shadow: var(--glow);
  }

  select option { background: #07111a; }

  /* Checkbox row */
  .check-row {
    display: flex; flex-wrap: wrap; gap: 18px; margin-top: 4px;
  }

  .check-label {
    display: flex; align-items: center; gap: 8px;
    font-size: 0.78rem; color: var(--muted); cursor: pointer;
    transition: color 0.2s;
  }

  .check-label:hover { color: var(--text); }

  .check-label input[type=checkbox] {
    width: 14px; height: 14px;
    accent-color: var(--accent);
    cursor: pointer;
  }

  /* Buttons */
  .btn-row {
    display: flex; gap: 12px; margin-top: 20px; flex-wrap: wrap;
  }

  button {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 12px 24px;
    border: none; border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex; align-items: center; gap: 8px;

  button:disabled { opacity: 0.35; cursor: not-allowed; }

    background: var(--accent);
    color: #000;
    box-shadow: 0 0 16px rgba(0,212,255,0.35);

  .btn-play:hover:not(:disabled) {

    box-shadow: 0 0 24px rgba(0,212,255,0.6);

// ============================================================
// Bitstream reader
// ============================================================
function bsrGetByte(data, bytePos, bitPos, offset) {
  const idx = bytePos + offset;
  if (idx >= data.length) return 0;
  let b = data[idx];
  // bit-reverse each byte (spec sec. 3.1)
  b = (((b >> 4) | (b << 4)) & 0xFF);
  b = (((b & 0xCC) >> 2) | ((b & 0x33) << 2)) & 0xFF;
  b = (((b & 0xAA) >> 1) | ((b & 0x55) << 1)) & 0xFF;
  return b;
}

function makeBsr(data) {
  return { data, bytePos: 0, bitPos: 0 };
}

function bsrGetBits(r, count) {
  let w = bsrGetByte(r.data, r.bytePos, r.bitPos, 0) << 8;
  if (r.bitPos + count > 8)
    w |= bsrGetByte(r.data, r.bytePos, r.bitPos, 1);
  w = (w << r.bitPos) & 0xFFFF;
  const value = (w >> (16 - count)) & 0xFFFF;
  r.bitPos += count;
  if (r.bitPos >= 8) { r.bitPos -= 8; r.bytePos++; }
  return value;
}

// ============================================================
// Frame decoder
// ============================================================
function decodeFrame(r, chip, prevK) {
  const f = { energyIdx:0, energy:0, period:0, repeat:false, k:new Array(10).fill(0), isSilence:false, isStop:false };
  f.energyIdx = bsrGetBits(r, 4);
  if (f.energyIdx === 0)  { f.isSilence = true; return f; }
  if (f.energyIdx === 0xF){ f.isStop    = true; return f; }

  f.energy = chip.energy[f.energyIdx];
  f.repeat = !!bsrGetBits(r, 1);

  const pitchBits = chip.pitchCount === 64 ? 6 : 5;
  const pitchIdx  = bsrGetBits(r, pitchBits);
  f.period = chip.pitch[pitchIdx];

  if (f.repeat) { for (let i=0;i<10;i++) f.k[i] = prevK[i]; return f; }

  f.k[0] = chip.k[0][bsrGetBits(r, 5)];
  f.k[1] = chip.k[1][bsrGetBits(r, 5)];
  f.k[2] = chip.k[2][bsrGetBits(r, 4)];
  f.k[3] = chip.k[3][bsrGetBits(r, 4)];

  if (f.period !== 0) {
    f.k[4] = chip.k[4][bsrGetBits(r, 4)];
    f.k[5] = chip.k[5][bsrGetBits(r, 4)];
    f.k[6] = chip.k[6][bsrGetBits(r, 4)];
    f.k[7] = chip.k[7][bsrGetBits(r, 3)];
    f.k[8] = chip.k[8][bsrGetBits(r, 3)];
    f.k[9] = chip.k[9][bsrGetBits(r, 3)];
  }
  return f;
}

// ============================================================
// Synthesizer
// ============================================================
const SAMPLES_PER_FRAME = 200;
const K_SCALE = 512.0;
const OUTPUT_GAIN = 1.5;

function makeState() {
  return { x: new Float64Array(10), synthRand: 1, periodCounter: 0 };
}

function excitation(s, energy, period, chirp, usePulse) {
  let u10;
  if (period > 0) {
    let sv;
    if (usePulse) {
      sv = s.periodCounter === 0 ? 127 : 0;
    } else {
      sv = (s.periodCounter < chirp.length && s.periodCounter < 41) ? chirp[s.periodCounter] : 0;
    }
    u10 = (sv / 256.0) * (energy / 256.0);
    if (s.periodCounter >= period - 1) s.periodCounter = 0;
    else s.periodCounter++;
  } else {
    s.synthRand = ((s.synthRand >> 1) ^ ((s.synthRand & 1) ? 0xB800 : 0)) & 0xFFFF;
    const noise = (s.synthRand & 1) ? 64 : -64;
    u10 = (noise / 256.0) * (energy / 256.0);
  }
  return u10;
}

function latticeFilter(s, u10, k) {
  const x = s.x;
  const u9  = u10 - (k[9]/K_SCALE)*x[9];
  const u8  = u9  - (k[8]/K_SCALE)*x[8];
  const u7  = u8  - (k[7]/K_SCALE)*x[7];
  const u6  = u7  - (k[6]/K_SCALE)*x[6];
  const u5  = u6  - (k[5]/K_SCALE)*x[5];
  const u4  = u5  - (k[4]/K_SCALE)*x[4];
  const u3  = u4  - (k[3]/K_SCALE)*x[3];
  const u2  = u3  - (k[2]/K_SCALE)*x[2];
  const u1  = u2  - (k[1]/K_SCALE)*x[1];
  let   u0  = u1  - (k[0]/K_SCALE)*x[0];
  if (u0 >  1.0) u0 =  1.0;
  if (u0 < -1.0) u0 = -1.0;
  x[9] = x[8] + (k[8]/K_SCALE)*u8;
  x[8] = x[7] + (k[7]/K_SCALE)*u7;
  x[7] = x[6] + (k[6]/K_SCALE)*u6;
  x[6] = x[5] + (k[5]/K_SCALE)*u5;
  x[5] = x[4] + (k[4]/K_SCALE)*u4;
  x[4] = x[3] + (k[3]/K_SCALE)*u3;
  x[3] = x[2] + (k[2]/K_SCALE)*u2;
  x[2] = x[1] + (k[1]/K_SCALE)*u1;
  x[1] = x[0] + (k[0]/K_SCALE)*u0;
  x[0] = u0;
  return u0;
}

function synthesize(data, chip, useInterp, unvoicedNoInterp, usePulse, maxFrames) {
  const r = makeBsr(data);
  const s = makeState();
  const samples = [];

  const prevK   = new Array(10).fill(0);
  const curK    = new Array(10).fill(0);
  const synthK  = new Array(10).fill(0);
  const fromK   = new Array(10).fill(0);
  const tgtK    = new Array(10).fill(0);

  let curEnergy = 0, curPeriod = 0;
  let endingCountdown = -1;
  let frameCount = 0;

  while (true) {
    let frame;
    if (endingCountdown < 0) {
      frame = decodeFrame(r, chip, prevK);
    } else {
      frame = { energyIdx:0, energy:0, period:0, repeat:false, k:new Array(10).fill(0), isSilence:true, isStop:false };
    }

    if (frame.isStop && endingCountdown < 0) {
      endingCountdown = 2;
      frame = { energyIdx:0, energy:0, period:0, repeat:false, k:new Array(10).fill(0), isSilence:true, isStop:false };
    }

    const fromEnergy = curEnergy;
    const fromPeriod = curPeriod;
    for (let i=0;i<10;i++) fromK[i] = curK[i];

    const tgtEnergy = frame.energy;
    const tgtPeriod = frame.period;
    for (let i=0;i<10;i++) tgtK[i] = frame.k[i];

    const nowVoiced  = curPeriod !== 0;
    const nowSilence = curEnergy === 0;
    const tgtVoiced  = tgtPeriod !== 0;
    const voicesDiffer = nowVoiced !== tgtVoiced;
    const skipInterp = !useInterp
      || (nowSilence !== (tgtEnergy === 0))
      || (unvoicedNoInterp && voicesDiffer);

    // Loop guard
    if (frameCount >= maxFrames
        && frame.energyIdx === 0
        && tgtEnergy === 0 && tgtPeriod === 0
        && !frame.repeat && endingCountdown === -1) break;

    let synEnergy = fromEnergy;
    let synPeriod = fromPeriod;
    for (let i=0;i<10;i++) synthK[i] = fromK[i];

    for (let si = 0; si < SAMPLES_PER_FRAME; si++) {
      if (!skipInterp) {
        const t = si + 1;
        synEnergy = Math.round(fromEnergy + (tgtEnergy - fromEnergy) * t / SAMPLES_PER_FRAME);
        synPeriod = Math.round(fromPeriod + (tgtPeriod - fromPeriod) * t / SAMPLES_PER_FRAME);
        for (let i=0;i<10;i++)
          synthK[i] = Math.round(fromK[i] + (tgtK[i] - fromK[i]) * t / SAMPLES_PER_FRAME);
      }
      const u10 = excitation(s, synEnergy, synPeriod, chip.chirp, usePulse);
      const smp = latticeFilter(s, u10, synthK);
      samples.push(smp * OUTPUT_GAIN);
    }

    curEnergy = tgtEnergy; curPeriod = tgtPeriod;
    for (let i=0;i<10;i++) { curK[i] = tgtK[i]; prevK[i] = tgtK[i]; }
    frameCount++;

    if (endingCountdown > 0) { endingCountdown--; if (endingCountdown === 0) break; }
  }

  return new Float64Array(samples);
}

// ============================================================
// Normalise + quantise to Int16
// ============================================================
function normaliseSamples(samples, gainFrac) {
  let peak = 0;
  for (let i=0;i<samples.length;i++) { const v = Math.abs(samples[i]); if (v>peak) peak=v; }
  const scale = peak > 0 ? gainFrac * 32767.0 / peak : 0;
  const out = new Int16Array(samples.length);
  for (let i=0;i<samples.length;i++) {
    let v = samples[i] * scale;
    if (v >  32767) v =  32767;
    if (v < -32768) v = -32768;
    out[i] = v | 0;
  }
  return out;
}

// ============================================================
// Nearest-neighbour resample 8000 → 48000 Hz
// ============================================================
function resample8to48(pcm16) {
  const ratio = 48000 / 8000; // = 6
  const outLen = Math.floor(pcm16.length * ratio);
  const out = new Int16Array(outLen);
  for (let i=0;i<outLen;i++) {
    const srcIdx = Math.round(i / ratio);
    out[i] = pcm16[srcIdx < pcm16.length ? srcIdx : pcm16.length - 1];
  }
  return out;
}

// ============================================================
// WAV builder (16-bit mono)
// ============================================================
function buildWav(pcm16, sampleRate) {
  const dataLen = pcm16.length * 2;
  const buf = new ArrayBuffer(44 + dataLen);
  const dv  = new DataView(buf);
  // RIFF header
  dv.setUint8(0,0x52);dv.setUint8(1,0x49);dv.setUint8(2,0x46);dv.setUint8(3,0x46);
  dv.setUint32(4, 36 + dataLen, true);
  dv.setUint8(8,0x57);dv.setUint8(9,0x41);dv.setUint8(10,0x56);dv.setUint8(11,0x45);
  // fmt chunk
  dv.setUint8(12,0x66);dv.setUint8(13,0x6d);dv.setUint8(14,0x74);dv.setUint8(15,0x20);
  dv.setUint32(16, 16, true);
  dv.setUint16(20, 1,  true); // PCM
  dv.setUint16(22, 1,  true); // channels
  dv.setUint32(24, sampleRate, true);
  dv.setUint32(28, sampleRate * 2, true); // byte rate
  dv.setUint16(32, 2, true); // block align
  dv.setUint16(34, 16, true); // bits
  // data chunk
  dv.setUint8(36,0x64);dv.setUint8(37,0x61);dv.setUint8(38,0x74);dv.setUint8(39,0x61);
  dv.setUint32(40, dataLen, true);
  for (let i=0;i<pcm16.length;i++) dv.setInt16(44 + i*2, pcm16[i], true);
  return buf;
}

// ============================================================
// Waveform visualiser
// ============================================================
function drawWaveform(pcm16) {
  const canvas = document.getElementById('waveCanvas');
  const dpr = window.devicePixelRatio || 1;
  canvas.width  = canvas.offsetWidth  * dpr;
  canvas.height = canvas.offsetHeight * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const W = canvas.offsetWidth, H = canvas.offsetHeight;

  ctx.clearRect(0,0,W,H);

  // BG
  ctx.fillStyle = '#07111a';
  ctx.fillRect(0,0,W,H);

  // Centre line
  ctx.strokeStyle = 'rgba(26,58,85,0.8)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0,H/2); ctx.lineTo(W,H/2); ctx.stroke();

  if (!pcm16 || pcm16.length === 0) return;

  // Downsample for display
  const buckets = W * 2;
  const bSize = Math.ceil(pcm16.length / buckets);
  const mins = new Float32Array(buckets);
  const maxs = new Float32Array(buckets);
  for (let b=0;b<buckets;b++) {
    let mn=32767, mx=-32768;
    const start = b*bSize, end=Math.min(start+bSize, pcm16.length);
    for (let i=start;i<end;i++) { if(pcm16[i]<mn)mn=pcm16[i]; if(pcm16[i]>mx)mx=pcm16[i]; }
    mins[b]=mn; maxs[b]=mx;
  }

  const grad = ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0, 'rgba(0,212,255,0.9)');
  grad.addColorStop(0.5,'rgba(0,212,255,0.5)');
  grad.addColorStop(1, 'rgba(0,212,255,0.9)');
  ctx.fillStyle = grad;

  for (let b=0;b<buckets;b++) {
    const x = b / buckets * W;
    const bw = W / buckets + 0.5;
    const yMin = (1 - maxs[b]/32768) * H/2;
    const yMax = (1 - mins[b]/32768) * H/2;
    const h = Math.max(1, yMax - yMin);
    ctx.fillRect(x, yMin, bw, h);
  }
}

// ============================================================
// UI state
// ============================================================
let fileData = null;
let lastPcm48 = null;
let lastWavBuf = null;
let audioCtx = null;
let currentSource = null;

function setStatus(msg, cls='') {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = cls;
}

function updateInfo(pcm48) {
  const dur = pcm48.length / 48000;
  document.getElementById('timeDisplay').textContent = dur.toFixed(2) + ' s';
  document.getElementById('sampleDisplay').textContent = pcm48.length.toLocaleString() + ' samples @ 48 kHz';
}

// File handling
const dropzone = document.getElementById('dropzone');
const fileInput = document.getElementById('fileInput');

dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag-over'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
dropzone.addEventListener('drop', e => {
  e.preventDefault(); dropzone.classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if (f) loadFile(f);
});
fileInput.addEventListener('change', () => { if (fileInput.files[0]) loadFile(fileInput.files[0]); });

function loadFile(f) {
  const reader = new FileReader();
  reader.onload = e => {
    fileData = new Uint8Array(e.target.result);
    document.getElementById('fileLoaded').style.display = 'flex';
    document.getElementById('fileName').textContent = f.name;
    document.getElementById('fileSize').textContent = fileData.length.toLocaleString() + ' bytes';
    document.getElementById('btnPlay').disabled = false;
    lastPcm48 = null; lastWavBuf = null;
    document.getElementById('btnDownload').disabled = true;
    drawWaveform(null);
    setStatus('File loaded. Press ▶ Decode & Play.', 'info');
  };
  reader.readAsArrayBuffer(f);
}

// ============================================================
// Decode
// ============================================================
function decode() {
  if (!fileData) return;

  const chipName = document.getElementById('chip').value;
  const gain = parseFloat(document.getElementById('gain').value) / 100;
  const startAddrStr = document.getElementById('startAddr').value.trim();
  const startAddr = parseInt(startAddrStr, 16) || 0;
  const maxFrames = parseInt(document.getElementById('maxFrames').value) || 200;
  const noInterp = document.getElementById('noInterp').checked;
  const fullInterp = document.getElementById('fullInterp').checked;
  const usePulse = document.getElementById('usePulse').checked;

  const chip = CHIPS[chipName];
  if (!chip) { setStatus('Unknown chip!', 'err'); return; }
  if (startAddr >= fileData.length) { setStatus('Start address out of range.', 'err'); return; }

  const data = fileData.slice(startAddr);
  const useInterp = !noInterp;
  const unvoicedNoInterp = !fullInterp;

  setStatus('Decoding…', 'info');

  // setTimeout to let the UI update before heavy work
  setTimeout(() => {
    try {
      const raw = synthesize(data, chip, useInterp, unvoicedNoInterp, usePulse, maxFrames);
      if (raw.length === 0) { setStatus('No samples produced. Check file and settings.', 'err'); return; }

      const pcm16_8k = normaliseSamples(raw, gain);
      const pcm16_48k = resample8to48(pcm16_8k);
      lastPcm48 = pcm16_48k;

      drawWaveform(pcm16_48k);
      updateInfo(pcm16_48k);

      const dur = (raw.length / 8000).toFixed(2);
      setStatus(`✔ Decoded ${raw.length.toLocaleString()} samples (${dur}s) → resampled to 48 kHz`, 'ok');

      // Build WAV buffer for download
      lastWavBuf = buildWav(pcm16_48k, 48000);
      document.getElementById('btnDownload').disabled = false;

      // Auto-play
      playPcm(pcm16_48k);
    } catch(err) {
      setStatus('Error: ' + err.message, 'err');
      console.error(err);
    }
  }, 20);
}

function playPcm(pcm16) {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 48000 });
  if (audioCtx.state === 'suspended') audioCtx.resume();
  if (currentSource) { try { currentSource.stop(); } catch(e){} }

  const n = pcm16.length;
  const abuf = audioCtx.createBuffer(1, n, 48000);
  const ch = abuf.getChannelData(0);
  for (let i=0;i<n;i++) ch[i] = pcm16[i] / 32768.0;

  const src = audioCtx.createBufferSource();
  src.buffer = abuf;
  src.connect(audioCtx.destination);
  src.start();
  currentSource = src;
  src.onended = () => { if (currentSource === src) currentSource = null; };
}

document.getElementById('btnPlay').addEventListener('click', () => {
  if (lastPcm48) {
    // Re-play already decoded audio
    playPcm(lastPcm48);
    setStatus('▶ Playing…', 'info');
  } else {
    decode();
  }
});

document.getElementById('btnDownload').addEventListener('click', () => {
  if (!lastWavBuf) return;
  const blob = new Blob([lastWavBuf], { type: 'audio/wav' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'decoded_48khz.wav';
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 1000);
});

// Reset decode cache when settings change so next Play re-decodes
['chip','gain','startAddr','maxFrames','noInterp','fullInterp','usePulse'].forEach(id => {
  const el = document.getElementById(id);
  el.addEventListener('change', () => { lastPcm48 = null; lastWavBuf = null; document.getElementById('btnDownload').disabled = true; });
  el.addEventListener('input',  () => { lastPcm48 = null; lastWavBuf = null; document.getElementById('btnDownload').disabled = true; });
});
</script>
